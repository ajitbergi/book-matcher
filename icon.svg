<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="115"/>

  <!-- Left page -->
  <path d="M 80,225 L 248,202 L 248,410 L 80,430 Z" fill="white"/>

  <!-- Right page -->
  <path d="M 264,202 L 432,225 L 432,430 L 264,410 Z" fill="rgba(255,255,255,0.78)"/>

  <!-- Spine -->
  <rect x="248" y="202" width="16" height="208" rx="4" fill="white"/>

  <!-- Page lines -->
  <rect x="106" y="262" width="118" height="10" rx="5" fill="rgba(109,40,217,0.18)"/>
  <rect x="106" y="288" width="96" height="10" rx="5"  fill="rgba(109,40,217,0.18)"/>
  <rect x="106" y="314" width="110" height="10" rx="5" fill="rgba(109,40,217,0.18)"/>
  <rect x="106" y="340" width="80" height="10" rx="5"  fill="rgba(109,40,217,0.18)"/>

  <!-- Heart -->
  <path d="M 256,185 C 256,185 206,165 206,135 C 206,110 231,100 256,125 C 281,100 306,110 306,135 C 306,165 256,185 256,185 Z"
        fill="#fbbf24"/>

  <!-- Sparkles -->
  <circle cx="190" cy="108" r="8" fill="rgba(251,191,36,0.7)"/>
  <circle cx="322" cy="108" r="6" fill="rgba(251,191,36,0.6)"/>
  <circle cx="200" cy="76"  r="5" fill="rgba(251,191,36,0.5)"/>
  <circle cx="312" cy="80"  r="4" fill="rgba(251,191,36,0.5)"/>
</svg>
